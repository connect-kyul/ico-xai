<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ico-XAI Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c0f12;
        --panel: #161b21;
        --line: #303944;
        --text: #f7f9fc;
        --muted: #a6b0bd;
        --mint: #58f0c2;
        --cyan: #5cc8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(92, 200, 255, 0.18), transparent 24rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(880px, calc(100% - 40px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(22, 27, 33, 0.9);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 42px;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      button {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: var(--mint);
        color: #06100d;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      .device {
        margin: 24px 0;
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-radius: 8px;
        background: #202730;
        padding: 14px;
      }

      code {
        color: var(--cyan);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ico-XAI Desktop</h1>
      <p>웹 계정과 이 컴퓨터를 페어링한 뒤, 승인된 권한만 원격 에이전트가 사용할 수 있습니다.</p>
      <section class="device" id="device"></section>
      <button id="request">컴퓨터 제어 권한 승인</button>
    </main>
    <script>
      const deviceEl = document.querySelector("#device");
      const button = document.querySelector("#request");

      function render(device) {
        deviceEl.innerHTML = `
          <div class="row"><strong>Device ID</strong><code>${device.id}</code></div>
          <div class="row"><strong>Platform</strong><span>${device.platform}</span></div>
          <div class="row"><strong>Status</strong><span>${device.status}</span></div>
          <div class="row"><strong>Permissions</strong><span>${device.permissions.join(", ")}</span></div>
        `;
      }

      window.icoXai.getDevice().then(render);
      button.addEventListener("click", async () => {
        render(await window.icoXai.requestControl());
      });
    </script>
  </body>
</html>
